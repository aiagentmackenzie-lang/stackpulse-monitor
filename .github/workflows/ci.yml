name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer

jobs:
  test:
    name: Test
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
      
      - name: Cache Derived Data
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-xcode-${{ hashFiles('**/*.xcodeproj') }}
          restore-keys: |
            ${{ runner.os }}-xcode-
      
      - name: Run Unit Tests
        run: |
          xcodebuild test \
            -project StackPulseMonitor.xcodeproj \
            -scheme StackPulseMonitor \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro' \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults
      
      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./TestResults/coverage.xccovreport
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build
    runs-on: macos-latest
    needs: test
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
      
      - name: Build for iOS
        run: |
          xcodebuild build \
            -project StackPulseMonitor.xcodeproj \
            -scheme StackPulseMonitor \
            -configuration Debug \
            -destination 'generic/platform=iOS'
      
      - name: Build for Simulator
        run: |
          xcodebuild build \
            -project StackPulseMonitor.xcodeproj \
            -scheme StackPulseMonitor \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro'

  lint:
    name: SwiftLint
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Run SwiftLint
        uses: norio-nomura/action-swiftlint@swiftlint@2
        with:
          args: --reporter github-actions-log
